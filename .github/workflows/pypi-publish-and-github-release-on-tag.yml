name: pypi

# Opt-in: a `git push origin <v-tag>` does NOT trigger publishing.
# Run explicitly via:
#   gh workflow run publish-pypi.yml -f version=vX.Y.Z
# or in the GitHub UI: Actions → Publish to PyPI → Run workflow.
# The `version` input must be a tag that already exists on the repo;
# the build step checks it out so what is tagged is what ships.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag to publish (e.g. v0.10.19) — must already exist on the repo'
        required: true
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
          fetch-depth: 0   # tags are needed for setuptools-scm
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install build tools
        run: pip install build
      - name: Build distribution
        run: python -m build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/scitex-tex
    permissions:
      id-token: write   # OIDC for trusted publisher
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Publish to PyPI (trusted publisher / OIDC)
        uses: pypa/gh-action-pypi-publish@release/v1

  release:
    # Sync a GitHub Release with every PyPI publish. Notes come from
    # CHANGELOG.md (section heading "## [VERSION]"); wheel + sdist
    # attach as release assets so users can audit what shipped without
    # cloning.
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write   # gh release create
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version }}
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist
      - name: Extract release notes from CHANGELOG.md
        id: notes
        run: |
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          # Capture lines from "## [VERSION]" up to (but not including)
          # the next "## [" heading. Falls back to a one-liner if the
          # section is missing so the release is still created.
          awk -v v="$VERSION" '
            $0 ~ "^## \\[" v "\\]" {p=1; next}
            p && /^## \[/ {exit}
            p
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release v${VERSION}. See CHANGELOG.md for details." > release-notes.md
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ inputs.version }}" \
            --title "${{ inputs.version }}" \
            --notes-file release-notes.md \
            dist/*
